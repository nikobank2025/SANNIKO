<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Información Bancaria</title>

<style>

body{
font-family:Arial;
background:#f4f6f8;
margin:0;
padding:20px;
}

.card{

background:white;
padding:25px;
border-radius:14px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);

max-width:500px;
margin:auto;

}

h2{
text-align:center;
font-size:22px;
}

.info{

background:#f1f1f1;
padding:15px;
border-radius:10px;

font-size:16px;
line-height:1.6;

white-space:pre-line;

}

button{

margin-top:15px;
padding:15px;

border:none;
border-radius:10px;

font-size:18px;

cursor:pointer;

width:100%;

}

.copy{

background:#007bff;
color:white;

}

.msg{

margin-top:10px;
text-align:center;

color:green;
font-weight:bold;

}

</style>

</head>

<body>

<div class="card">

<h2>💳 Información Bancaria</h2>

<div id="bankInfo" class="info">

BANCO: SANTANDER
COM NIKO SPA
RUT: 77860543-0
CUENTA CORRIENTE: 93263723
EMAIL: Nikospa8888@gmail.com

</div>

<button class="copy" onclick="copyInfo()">
📋 Copiar Información
</button>

<div id="msg" class="msg"></div>

</div>

<script>

function copyInfo(){

const text=document.getElementById("bankInfo").innerText;

navigator.clipboard.writeText(text).then(()=>{

document.getElementById("msg").innerText="✅ Información copiada";

});

}

</script>

</body>
</html>
