<!DOCTYPE html>
<html lang="es">
<head>

<title>Copiar Información</title>
</head>

<body>

<script>

const bankInfo = `BANCO: ITAU
COM NIKO SPA

navigator.clipboard.writeText(bankInfo).then(()=>{

});

</script>

</body>
</html>
